server:
  port: 8081

spring:
  application:
    name: reservation-system
  
  datasource:
    url: jdbc:postgresql://flight-postgres:5432/flight_db
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: flight-redis
      port: 6379