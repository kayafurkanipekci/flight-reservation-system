server:
  port: 8081
  error:
    include-message: always
    include-stacktrace: always

spring:
  application:
    name: reservation-system

  datasource:
    url: jdbc:postgresql://flight-postgres:5432/flight_db
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: flight-redis
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:} # :' dan sonraki satırda password boş bırakılmasının sebebi localde çalıştırıken şifresiz olması
  
  mail:
    host: flight-mailhog
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

logging:
  level:
    com.flight.reservation_system.security: DEBUG
    org.springframework.web: DEBUG

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}