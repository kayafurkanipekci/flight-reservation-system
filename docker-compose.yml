services:
  flight-api:
    build:
      context: ./backend
    container_name: flight-api
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://flight-postgres:5432/flight_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      flight-postgres:
        condition: service_healthy
      flight-redis:
        condition: service_healthy
    networks:
      - flight-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  flight-frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8081/api
    container_name: flight-frontend
    ports:
      - "3000:80"
    depends_on:
      - flight-api
    networks:
      - flight-network

  flight-postgres:
    image: postgres:18-alpine
    container_name: flight-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: flight_db
    networks:
      - flight-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-redis:
    image: redis:7-alpine
    container_name: flight-redis
    ports:
      - "6379:6379"
    networks:
      - flight-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flight-pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@flight.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - flight-postgres
    networks:
      - flight-network
    
  flight-mailhog:
    image: mailhog/mailhog:latest
    container_name: flight-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - flight-network

networks:
  flight-network:
    driver: bridge